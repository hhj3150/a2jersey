[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so deep links work
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # CSP: Daum 우편번호 SDK + YouTube 임베드 + Railway API + Pretendard CDN 허용
    # 'unsafe-inline' (script): index.html 의 JSON-LD 인라인 블록 허용
    # 'unsafe-inline' (style): Tailwind/Vite 가 주입하는 인라인 스타일 허용
    # 'unsafe-eval': Daum postcode.v2.js 가 사용하는 eval 허용
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://t1.daumcdn.net https://*.daumcdn.net https://*.kakaocdn.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://*.up.railway.app https://*.railway.app https://api.solapi.com; frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://postcode.map.daum.net https://*.daum.net https://postcode.map.kakao.com https://*.kakao.com; form-action 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; upgrade-insecure-requests"

# /admin: 검색엔진 색인 차단 + 더 엄격
[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

# index.html: 절대 캐시 금지 (iOS Safari가 옛 번들 가리키는 옛 HTML을 보유하는 케이스 차단)
# 해시된 JS/CSS는 자동으로 영구 캐시되므로 성능 영향 없음
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# 해시된 정적 자산은 영구 캐시 (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
